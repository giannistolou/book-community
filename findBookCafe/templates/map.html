<!DOCTYPE html>
<html lang="el">
   <head>
      <title>Βρες την καφετέρια που σου ταιριάζει</title>
      {% load static %} {% include "commonHead.html" %}
      <meta
         name="keywords"
         content="book, books, reading, βιβλίο, βιβλία, διάβασμα, social media, book cafe, cafe, καφετέριες, βιβλιοθήκη,
		βιβλιοθήκες, library, libraries"
      />
      <meta
         name="description"
         content="Βρες το book cafe που σου ταιριάζει για διάβασμα ή δουλειά!"
      />
      <meta property="og:url" content="https://cafe.book-community.com/" />
      <meta property="og:title" content="Book cafe" />
      <meta
         property="og:description"
         content="Βρες το book cafe που σου ταιριάζει για διάβασμα ή δουλειά!"
      />
      <link rel="stylesheet" href="{% static 'style/theme.css' %}" />
         <link rel="stylesheet" href="{% static 'style/map.css' %}" />
      <link rel="canonical" href="https://cafe.book-community.com/map/" />
      <meta
         name="viewport"
         content="initial-scale=1,maximum-scale=1,user-scalable=no"
      />
      <link
         rel="stylesheet"
         href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
         integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
         crossorigin=""
      />
      <script
         src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
         integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
         crossorigin=""
      ></script>
   </head>
   <body>
      {% include "header.html" %}
      <main >
         <div id="map"></div>
         <button class="hideSuggestionEye" onclick="toggleNearestShopsList(event)">{% include "icons/bootstrap/eye.svg" %}</button>
         <section class="nearCafesLocation" id="nearestShopsList">
</section>
      </main>



      <script>
         var coordinates = [37.9753429, 23.7324272];

         // Initialize the Leaflet map
         var map = L.map("map").setView(coordinates, 12);

         // Add a tile layer to the map
         L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution:
               '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
         }).addTo(map);

         // Geolocation
         function getLocation() {
            if (navigator.geolocation) {
               navigator.geolocation.getCurrentPosition(showPosition);
            }
         }

         function showPosition(position) {
            coordinates = [position.coords.latitude, position.coords.longitude];
            map.setView(coordinates, 12);
         }

         getLocation();

         // Add markers from geojson
         const geojson = {
            type: "FeatureCollection",
            features: JSON.parse("{{shops|escapejs}}".replace(/'/g, '"')),
         };

         for (const marker of geojson.features) {
            L.marker(
               [marker.geometry.coordinates[1], marker.geometry.coordinates[0]],
               { color: "#635642" }
            )
               .bindPopup(
                  `<a href="${marker.path}/${marker.slug}" style="font-weight: bold; font-size:1.2rem; text-transform: capitalize;" >${marker.name}</a><p>${marker.shopType}</p><a href="${marker.directions}" target="_blank">Google Maps</a>`
               )
               .addTo(map);
         }


        function calculateDistance(locationA, locationB) {
            const R = 6371; // Earth's radius in km
            const dLat = (locationB.latitude - locationA.latitude) * Math.PI / 180;
            const dLon = (locationB.longitude - locationA.longitude) * Math.PI / 180;

            const a =
               Math.sin(dLat / 2) * Math.sin(dLat / 2) +
               Math.cos(locationA.latitude * Math.PI / 180) *
               Math.cos(locationB.latitude * Math.PI / 180) *
               Math.sin(dLon / 2) * Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
         }

         function showFourNearest({latitude, longitude}) {
            var shops = geojson.features;
            if(!shops || shops.length < 1) {
               return;
            }

            for(var i in shops){
               var shop = shops[i]
               shop.distance = calculateDistance({
                  latitude, longitude
               }, {
                  latitude: shop.geometry.coordinates[1],
                  longitude: shop.geometry.coordinates[0],
               })
            }
            var shopsToShow = shops.filter(shop => shop.distance < 50);
            shopsToShow = shopsToShow.sort((shopA, shopB) => shopA.distance - shopB.distance )
            shopsToShow = shopsToShow.slice(0, 4);
            var html = shopsToShow.map(shop => `
                     <div class="cafeItem cafeItemMap">
                           <a href="${shop.path}/${shop.slug}" class="card-body">
                              <img
                              class="thumbnail"
                              src="https://book-community.com/media/${shop.thumbnail}"
                              alt="{{shop.name}}"
                           />
                              <div class="cafe-link">${shop.name}</div>
                              <div class="location">${shop.address}</div>
                           </a>
                     </div>
            `).join('');

    document.getElementById('nearestShopsList').innerHTML = html;

         }
          function reloadNearestShops() {
            const center = map.getCenter();
            const coords = {
               latitude: center.lat,
               longitude: center.lng
            };
          showFourNearest(coords);
         }

            map.on("moveend", reloadNearestShops);

         function toggleNearestShopsList(e) {
            e.preventDefault();
            const list = document.getElementById('nearestShopsList');
   
            if(list.style.display === 'flex') {
               list.style.display = 'none';
               e.preventDefault();
               e.target.classList.add('active');
            } else {
               list.style.display = 'flex';
               e.preventDefault();
               e.target.classList.remove('active');
            }
         }
            
      </script>
   </body>
</html>
